<!DOCTYPE html>
<html>

<head>
    <title>Mask</title>
    <meta charset="utf-8">
    <style type="text/css">
        body {
            padding: 0;
            margin: 0;
        }

        html,
        body,
        #map {
            height: 100%;
        }

        .leaflet-container {
            cursor: default;
        }

        .leaflet-control-join-dots {
            width: 30px;
            height: 30px;
            background-color: white;
            align-content: center;
            text-align: center;
            vertical-align: middle;
            cursor: pointer !important;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src='https://api.mapbox.com/mapbox.js/plugins/leaflet-geodesy/v0.1.0/leaflet-geodesy.js'></script>
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
    <script src="https://kit.fontawesome.com/9ed6982e32.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/jsts@1.6.1/dist/jsts.min.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src='mask.js'></script>
    <script type="text/javascript" src='geojson-storage.js'></script>
    <script type="text/javascript" src='draw.js'></script>
</head>

<body>
    <div id='map'></div>
</body>
<script type="text/javascript">

    const map = L.map("map", {
        center: [41.53289317099601, 2.104000992549118],
        zoom: 10
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const storage = new GeoJsonStorage()

    storage.get()
        .then((geoJson) => {
            if (!geoJson) {
                geoJson = {}
            }
            const mask = L.mask(geoJson, { fillOpacity: 0.7, restrictBounds: false, fillColor: '#000000' }).addTo(map);

            const drawer = new Drawer(mask, storage, map);
            new DrawingButton(drawer).addTo(map);
            const gpxDrawer = new GpxDrawer(mask, storage);
            new GeoJsonLoader(storage, mask).addTo(map)
            new GeoJsonSaver(storage).addTo(map)
            new GpxAdder(gpxDrawer).addTo(map)

            map.on('click', drawer.onAdd)
            map.on('contextmenu', drawer.delete);

        })

</script>

</html>
